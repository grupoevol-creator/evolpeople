<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evol People — Gestão de Pessoas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <!--
                LOGO EVOL PEOPLE
                -----------------
                A marca Evol possui duas cores principais:
                  - Azul-ardósia: #2C4263
                  - Terracota:    #A96237

                O elemento .logo-mark abaixo já está estilizado via CSS
                com um fallback textual (a letra "e" em terracota) sobre
                fundo azul-ardósia, mantendo a identidade visual da marca.

                Para usar a logo real em imagem, basta substituir o
                <span class="logo-mark">e</span> por:

                    <img class="logo-mark" src="assets/logo-evol.png" alt="Evol">

                e ajustar no CSS (css/style.css) o seletor .logo-mark para:

                    .logo-mark {
                        width: 40px;
                        height: 40px;
                        object-fit: contain;
                        border-radius: 8px;
                        background: var(--azul); /* #2C4263 */
                    }

                ou, alternativamente, manter o <span> e aplicar a imagem
                via background-image:

                    .logo-mark {
                        background-color: var(--azul);
                        background-image: url('../assets/logo-evol.png');
                        background-size: cover;
                        background-position: center;
                        color: transparent;
                    }
            -->
            <span class="logo-mark">e</span>
            <div>
                <strong>Evol People</strong>
                <small>Gestão de Pessoas</small>
            </div>
        </div>
        <nav id="menu"></nav>
        <footer class="sidebar-footer">
            Desenvolvendo pessoas.<br>Fortalecendo cultura.
        </footer>
    </aside>
    <main>
        <header class="topbar">
            <h1 id="tituloPagina">Evol People</h1>
        </header>
        <div id="app" class="conteudo"></div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
